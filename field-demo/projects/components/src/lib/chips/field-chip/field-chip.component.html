<div
  class="chip-shell"
  [class.chip-staged-delete]="deletionStaged()"
  [class.chip-disabled]="disabled()"
  [class.chip-appr-transparent]="appearance() === 'transparent'"
  [class.chip-appr-filled]="appearance() === 'filled'"
  [class.chip-appr-no-bg]="appearance() === 'no-bg'"
  [class.chip-appr-outlined]="appearance() === 'outlined'"
  [attr.data-appearance]="appearance()"
  [attr.data-palette-tone]="paletteTone()"
>
  <div class="chip-inner">
    <button
      type="button"
      class="chip-main"
      [disabled]="disabled()"
      (click)="onMainClick()"
      (keydown)="onMainKeydown($event)"
    >
      @if (showLeadingIcon()) {
        <span class="chip-leading">
          <field-icon [name]="leadingIconName()" [svg]="leadingIconSvg()" />
        </span>
      }
      <span class="chip-label">{{ label() }}</span>
    </button>
    @if (removable()) {
      <button
        type="button"
        class="chip-remove"
        [disabled]="disabled()"
        aria-label="Remove"
        (click)="onRemoveClick($event)"
      >
        <field-icon name="close-small" />
      </button>
    }
  </div>
</div>
