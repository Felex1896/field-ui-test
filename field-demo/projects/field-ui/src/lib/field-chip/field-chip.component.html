<div
  class="chip-shell"
  [class.chip-disabled]="disabled()"
  [attr.data-appearance]="appearance()"
  [attr.data-palette-tone]="paletteTone()"
  [attr.data-vs]="visualState()"
>
  <div class="chip-inner">
    <button type="button" class="chip-main" [disabled]="disabled()" (click)="onMainClick()">
      @if (showLeadingIcon()) {
        <span class="chip-leading">
          <field-icon [name]="leadingIconName()" [svg]="leadingIconSvg()" />
        </span>
      }
      <span class="chip-label">{{ label() }}</span>
    </button>
    @if (removable()) {
      <button
        type="button"
        class="chip-remove"
        [disabled]="disabled()"
        aria-label="Remove"
        (click)="onRemoveClick($event)"
      >
        <field-icon name="close" />
      </button>
    }
  </div>
</div>
