<div class="field-wrapper" [class]="'state-' + state">
  <div
    class="body"
    [class.has-label]="showLabel"
    [class.label-floated]="isLabelFloated"
    (click)="fieldInput.focus()"
  >

    <!-- Leading icon -->
    @if (showLeadingIcon) {
      <div class="leading-icon">
        @if (leadingIconSvg) {
          <span class="icon-inline" [innerHTML]="safeLeadingIconSvg()" aria-hidden="true"></span>
        } @else {
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            @switch (leadingIconName) {
              @case ('menu') {
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
              @case ('search') {
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
              @case ('person') {
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
              @case ('lock') {
                <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
              @default {
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
            }
          </svg>
        }
      </div>
    }

    <!-- Text area: single stable DOM structure, CSS handles layout -->
    <div class="text-area">
      @if (showLabel) {
        <label class="field-label">{{ label }}</label>
      }
      <input
        #fieldInput
        class="field-input"
        [formControl]="control"
        [placeholder]="activePlaceholder"
        (focus)="onFocus()"
        (blur)="onBlur()"
      />
    </div>

    <!-- Suffix -->
    @if (showSuffix && suffix) {
      <span class="field-suffix" [class.suffix-with-label]="showLabel && isLabelFloated">{{ suffix }}</span>
    }

    <!-- Trailing icon -->
    @if (showTrailingIcon) {
      <div class="trailing-icon">
        @if (trailingIconSvg) {
          <span class="icon-inline" [innerHTML]="safeTrailingIconSvg()" aria-hidden="true"></span>
        } @else {
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            @switch (trailingIconName) {
              @case ('info') {
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
              @case ('close') {
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
              @case ('check') {
                <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              }
              @case ('eye') {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              }
              @default {
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              }
            }
          </svg>
        }
      </div>
    }

    <div class="bottom-line"></div>
  </div>

  @if (showHint) {
    <div class="field-hint hint-{{ hintColor }}">{{ hint }}</div>
  }
</div>
