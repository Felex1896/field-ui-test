<div class="field-wrapper" [class]="'state-' + state()" [class.suggest-open]="showSuggestPanel()">
  <div class="field-anchor">
    <div
      class="body"
      [class.has-label]="showLabel()"
      [class.label-floated]="isLabelFloated()"
      (click)="fieldInput.focus()"
    >
      <!-- Leading icon -->
      @if (showLeadingIcon()) {
        <div class="leading-icon">
          <field-icon [name]="leadingIconName()" [svg]="leadingIconSvg()" />
        </div>
      }

      <!-- Text area: single stable DOM structure, CSS handles layout -->
      <div class="text-area">
        @if (showLabel()) {
          <label class="field-label">{{ label() }}</label>
        }
        <input
          #fieldInput
          class="field-input"
          [formControl]="control()"
          [placeholder]="activePlaceholder()"
          [attr.aria-expanded]="suggestEnabled() ? showSuggestPanel() : null"
          [attr.aria-controls]="suggestEnabled() ? suggestPanel()?.listboxId : null"
          [attr.aria-autocomplete]="suggestEnabled() ? 'list' : null"
          [attr.aria-activedescendant]="
            suggestEnabled() ? suggestPanel()?.activeDescendantId() : null
          "
          (focus)="onFocus()"
          (blur)="onBlur()"
          (input)="onSuggestInput()"
          (keydown)="onSuggestKeydown($event)"
        />
      </div>

      <!-- Suffix -->
      @if (showSuffix() && suffix()) {
        <span class="field-suffix" [class.suffix-with-label]="showLabel() && isLabelFloated()">{{
          suffix()
        }}</span>
      }

      <!-- Trailing icon -->
      @if (showTrailingIcon()) {
        <div class="trailing-icon">
          <field-icon [name]="trailingIconName()" [svg]="trailingIconSvg()" />
        </div>
      }

      <div class="bottom-line"></div>
    </div>

    @if (showSuggestPanel()) {
      <field-suggest-panel
        #suggestPanel
        [items]="filteredSuggestItems()"
        [selectedValue]="control().value"
        (optionSelected)="onSuggestOptionSelected($event)"
        (dismissed)="onSuggestDismissed()"
      />
    }
  </div>

  @if (showHint()) {
    <div class="field-hint hint-{{ hintColor() }}">{{ hint() }}</div>
  }
</div>
