<div
  class="playground"
  [class.theme-light]="themeSvc.theme() === 'light'"
  [class.controls-drawer-open]="controlsDrawerOpen"
>
  @if (controlsDrawerOpen) {
    <div class="drawer-backdrop" (click)="closeControlsDrawer()" aria-hidden="true"></div>
  }

  <button
    type="button"
    class="drawer-menu-btn"
    (click)="toggleControlsDrawer()"
    [attr.aria-expanded]="controlsDrawerOpen"
    aria-controls="playground-controls-panel"
    [attr.aria-label]="controlsDrawerOpen ? 'Close controls panel' : 'Open controls panel'"
  >
    @if (controlsDrawerOpen) {
      <svg
        class="drawer-menu-icon"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M18 6L6 18M6 6l12 12"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    } @else {
      <svg
        class="drawer-menu-icon"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M4 6h16M4 12h16M4 18h16"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    }
  </button>

  <nav class="component-nav" aria-label="Playground components">
    <p class="component-nav-title">Components</p>
    <button
      type="button"
      class="component-nav-item"
      [class.active]="selectedComponent() === 'field'"
      (click)="setComponent('field')"
    >
      Field
    </button>
    <button
      type="button"
      class="component-nav-item"
      [class.active]="selectedComponent() === 'chips'"
      (click)="setComponent('chips')"
    >
      Chips
    </button>
  </nav>

  <!-- ── Preview ─────────────────────────────────────────────────────────── -->
  <div class="preview-panel">
    <div class="component-nav-mobile" aria-label="Playground components">
      <button
        type="button"
        class="component-nav-btn"
        [class.active]="selectedComponent() === 'field'"
        (click)="setComponent('field')"
      >
        Field
      </button>
      <button
        type="button"
        class="component-nav-btn"
        [class.active]="selectedComponent() === 'chips'"
        (click)="setComponent('chips')"
      >
        Chips
      </button>
    </div>

    @if (selectedComponent() === 'field') {
      <p class="preview-label">Field · optional suggest list</p>
      <pg-field-preview />
    } @else {
      <p class="preview-label">Chips · labeled pill</p>
      <pg-chips-preview />
    }
  </div>

  <!-- ── Controls panel (drawer on narrow viewports) ─────────────────────── -->
  <aside class="controls-panel" id="playground-controls-panel">
    <h2 class="controls-title">Controls</h2>

    <!-- Theme -->
    <div class="control-group">
      <div class="control-row">
        <label class="control-label">Light Theme</label>
        <pg-toggle
          [ngModel]="themeSvc.theme() === 'light'"
          (ngModelChange)="onThemeToggle($event)"
        />
      </div>
    </div>

    @if (selectedComponent() === 'field') {
      <pg-field-controls />
    } @else {
      <pg-chips-controls />
    }

    <p class="playground-foot">
      Stale UI after an update? Hard-refresh this page (e.g. Cmd+Shift+R).
    </p>
  </aside>
</div>
